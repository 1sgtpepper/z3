name: Bounded semantic validation

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Campaign duration in seconds
        required: false
        default: "2400"
      seed:
        description: Deterministic campaign seed
        required: false
        default: "7190117"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Restore command-line solver cache
        id: cache-z3
        uses: actions/cache@v6.1.0
        with:
          path: |
            build/z3
            build/libz3.so
            build/libz3.a
            build/*.so
            build/*.a
          key: z3-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            z3-build-${{ runner.os }}-

      - name: Check restored solver
        id: restored-z3
        run: |
          if test -x build/z3; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure fallback build
        if: steps.restored-z3.outputs.available != 'true'
        run: python3 scripts/mk_make.py

      - name: Build command-line solver when uncached
        if: steps.restored-z3.outputs.available != 'true'
        run: make -C build -j4

      - name: Restore private campaign
        env:
          CAMPAIGN_B64: ${{ secrets.SEMANTIC_CAMPAIGN_B64 }}
        run: |
          test -n "$CAMPAIGN_B64"
          printf '%s' "$CAMPAIGN_B64" | base64 --decode > "$RUNNER_TEMP/campaign.py"
          unset CAMPAIGN_B64
          python3 -m py_compile "$RUNNER_TEMP/campaign.py"

      - name: Run bounded semantic oracle
        id: campaign
        env:
          DURATION: ${{ inputs.duration }}
          SEED: ${{ inputs.seed }}
        run: |
          set +e
          mkdir -p "$RUNNER_TEMP/evidence"
          python3 "$RUNNER_TEMP/campaign.py" \
            --z3 "$PWD/build/z3" \
            --output "$RUNNER_TEMP/evidence" \
            --seconds "$DURATION" \
            --seed "$SEED"
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Encrypt private evidence
        env:
          EVIDENCE_KEY: ${{ secrets.SEMANTIC_EVIDENCE_KEY }}
        run: |
          test -n "$EVIDENCE_KEY"
          tar -C "$RUNNER_TEMP" -czf "$RUNNER_TEMP/evidence.tar.gz" evidence
          openssl enc -aes-256-cbc -salt -pbkdf2 \
            -in "$RUNNER_TEMP/evidence.tar.gz" \
            -out semantic-evidence.tar.gz.enc \
            -pass env:EVIDENCE_KEY
          rm -rf "$RUNNER_TEMP/campaign.py" "$RUNNER_TEMP/__pycache__" \
            "$RUNNER_TEMP/evidence" "$RUNNER_TEMP/evidence.tar.gz"

      - name: Upload encrypted evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bounded-semantic-evidence
          path: semantic-evidence.tar.gz.enc
          retention-days: 1
          if-no-files-found: error

      - name: Report generic outcome
        env:
          STATUS: ${{ steps.campaign.outputs.status }}
        run: |
          case "$STATUS" in
            0) echo "Bounded semantic campaign completed without a discrepancy." ;;
            2) echo "A repeatable semantic discrepancy was retained in encrypted evidence."; exit 1 ;;
            *) echo "The private semantic campaign did not complete cleanly."; exit 1 ;;
          esac
