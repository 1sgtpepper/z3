name: Isolated sanitizer validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ASAN_OPTIONS: abort_on_error=1:detect_leaks=0:halt_on_error=1:print_stacktrace=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure sanitizer build
        run: |
          cmake -S . -B build/research -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DZ3_BUILD_TEST_EXECUTABLES=OFF

      - name: Build command-line solver
        run: cmake --build build/research --target z3 --parallel 2

      - name: Run negative control
        run: printf '(check-sat)\n' | build/research/z3 -in

      - name: Run private C API reproducer when configured
        env:
          REPRO_B64: ${{ secrets.REPRO_B64 }}
        run: |
          if [ -z "$REPRO_B64" ]; then
            echo "No private reproducer configured; sanitizer build and negative control passed."
            exit 0
          fi
          printf '%s' "$REPRO_B64" | base64 --decode > "$RUNNER_TEMP/repro.cpp"
          unset REPRO_B64

          cleanup() {
            rm -f "$RUNNER_TEMP"/repro "$RUNNER_TEMP"/repro.cpp \
              "$RUNNER_TEMP"/repro-*.log "$RUNNER_TEMP"/control-*.log
          }
          trap cleanup EXIT

          if ! clang++ -std=c++20 \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Isrc/api "$RUNNER_TEMP/repro.cpp" build/research/libz3.a \
            -lpthread -ldl -o "$RUNNER_TEMP/repro" \
            >"$RUNNER_TEMP/compile.log" 2>&1; then
            rm -f "$RUNNER_TEMP/compile.log"
            echo "Private reproducer did not compile."
            exit 1
          fi
          rm -f "$RUNNER_TEMP/compile.log"

          set +e
          "$RUNNER_TEMP/repro" valid-poly >"$RUNNER_TEMP/control-valid.log" 2>&1
          valid_status=$?
          "$RUNNER_TEMP/repro" excess-mono >"$RUNNER_TEMP/control-invalid.log" 2>&1
          invalid_status=$?
          if [ "$valid_status" -ne 0 ] || [ "$invalid_status" -ne 0 ] || \
             grep -Eq 'AddressSanitizer|UndefinedBehaviorSanitizer|runtime error:' \
               "$RUNNER_TEMP"/control-*.log; then
            echo "Private negative control failed."
            exit 1
          fi

          for attempt in 1 2 3 4 5; do
            log="$RUNNER_TEMP/repro-$attempt.log"
            "$RUNNER_TEMP/repro" excess-poly >"$log" 2>&1
            status=$?
            if [ "$status" -eq 0 ] || ! grep -Eq 'AddressSanitizer|UndefinedBehaviorSanitizer|runtime error:' "$log"; then
              echo "Private sanitizer validation did not reproduce on attempt $attempt."
              exit 1
            fi
          done
          echo "Private sanitizer signature confirmed in 5 of 5 attempts."
